<div class="flex flex-col gap-2">
    <a href="{{ toc_item.url }}" data-toc-link data-active="false"
        class="text-sm text-muted-foreground no-underline transition-colors hover:text-foreground data-[active=true]:font-medium data-[active=true]:text-foreground"
        onClick="deferSetActiveTocLink('{{ toc_item.url }}');">
        {{ toc_item.title }}
    </a>
    {% if toc_item.children %}
    <div class="ml-3 flex flex-col gap-2 border-l border-sidebar-border/60 pl-3">
        {% for child_toc_item in toc_item.children %}
        {% with toc_item=child_toc_item %}
        {% include "components/bottom_sidebar_toc_item.html" %}
        {% endwith %}
        {% endfor %}
    </div>
    {% endif %}
</div>
