<div style="position: relative; display: inline-block">
    <button
        id="dropdownBtn"
        style="
            padding: 10px 16px;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            background: #fff;
            cursor: pointer;
        "
        onclick="toggleDropdown()"
    >
        versions
    </button>

    <div
        id="dropdownList"
        style="
            display: none;
            position: fixed;
            z-index: 9999;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            background: #fff;
        "
    ></div>
</div>
